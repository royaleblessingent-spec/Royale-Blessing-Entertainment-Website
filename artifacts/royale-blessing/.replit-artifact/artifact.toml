kind = "web"
previewPath = "/royale-blessing/"
title = "Royale Blessing Entertainment"
version = "1.0.0"
id = "artifacts/royale-blessing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/royale-blessing/" ]
localPort = 23725

[services.development]
run = "pnpm --filter @workspace/royale-blessing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/royale-blessing", "run", "build" ]
publicDir = "artifacts/royale-blessing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23725"
BASE_PATH = "/royale-blessing/"
